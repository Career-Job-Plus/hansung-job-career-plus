<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한성대학교 취업지원 통합관리</title>
    <style>
        /* (기존 스타일 유지 및 관리자용 색상 최적화) */
        :root { --primary-color: #005eb8; --admin-color: #2c3e50; --student-color: #27ae60; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: #f4f7f9; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .section-title { border-left: 5px solid var(--primary-color); padding-left: 15px; margin: 40px 0 20px; font-size: 1.4rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card-admin { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-decoration: none; color: var(--admin-color); font-weight: bold; display: flex; align-items: center; border: 1px solid #ddd; }
        .card-qr { background: white; padding: 20px; border-radius: 12px; border: 1px solid #eee; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .qr-img { width: 120px; height: 120px; cursor: pointer; border: 1px solid #eee; margin: 10px 0; transition: transform 0.2s; }
        .qr-img:hover { transform: scale(1.05); }
        .btn-copy { width: 100%; padding: 8px; background: #f8f9fa; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; font-size: 0.85rem; margin-top: 5px; }
        .btn-copy:hover { background: #e9ecef; }
    </style>
</head>
<body>

<header style="background: white; padding: 15px; text-align: center; border-bottom: 2px solid var(--primary-color);">
    <h1 style="margin:0; font-size: 1.2rem; color: var(--primary-color);">한성대 재학생맞춤형고용서비스 통합 대시보드</h1>
</header>

<div class="container">
    <h2 class="section-title">💼 선생님 전용 업무 도구</h2>
    <div id="admin-tools" class="grid"></div>

    <h2 class="section-title" style="border-color: var(--student-color);">📢 링크 및 QR코드 복사 (클릭 시 복사)</h2>
    <div id="student-tools" class="grid"></div>
</div>

<script>
    // 1. [선생님 전용 도구] 설정
    const ADMIN_CONFIG = [
        { name: "📊 월별 활동 사전 신청 관리", url: "https://docs.google.com/spreadsheets/d/17w7vLpVqVy797paESqBnUjYppYQ3s0vVNPLsaPYKnXQ/edit?usp=sharing" },
        { name: "📝 수당 신청 관리 앱", url: "https://www.appsheet.com/start/b5f63791-50fd-497b-ae6d-5de4520da700" },
        { name: "💰 수당 신청 데이터 시트", url: "https://docs.google.com/spreadsheets/d/1b32jM_tQKK7gVwMykBMudUdJ5qOj7i81OkkboUcuoOI/edit?usp=sharing" },
        { name: "🔗 기념품 수령대장 관리 시트", url: "https://docs.google.com/spreadsheets/d/1UUG3MIXHbZLt0hI7Y-ohJcM1HnsvZBylQM-UGK3mphg/edit?gid=0#gid=0" }
    ];

    // 2. [배포용 퀵 메뉴] 설정
    const STUDENT_CONFIG = [
        { name: "월별 활동 사전 신청", url: "https://script.google.com/macros/s/AKfycbzVh7cycwrMND91Z9PrMBLQBvTtwKP-veqmbm8YQ4m5mz7taPt9AopsyWxXnz_CL72P/exec", qr: "qr_sajun.png" },
        { name: "기념품 수령대장(랜덤)", url: "https://script.google.com/macros/s/AKfycbxiB_ODpgTavxij6N6-iDV7tMPhhdx8_awaiNZ-xEd02A7QnztwqvK-Ja7jL1ndnGtE/exec", qr: "qr_goods.png" },
        { name: "없음", url: "https://bit.ly/hansung_guide", qr: "qr_info.png" }
    ];

    // --- 아래는 자동 실행되는 기능이므로 건드리지 않으셔도 됩니다 ---

    // 화면 그리기 함수
    function renderTools() {
        const adminContainer = document.getElementById('admin-tools');
        const studentContainer = document.getElementById('student-tools');

        // 선생님 도구 렌더링
        ADMIN_CONFIG.forEach(item => {
            adminContainer.innerHTML += `<a href="${item.url}" target="_blank" class="card-admin">🔗 ${item.name}</a>`;
        });

        // 학생 도구 렌더링
        STUDENT_CONFIG.forEach(item => {
            studentContainer.innerHTML += `
                <div class="card-qr">
                    <div style="font-weight:bold; color:#555;">${item.name}</div>
                    <img src="${item.qr}" class="qr-img" title="클릭하면 이미지 복사" onclick="copyImage('${item.qr}')">
                    <button class="btn-copy" onclick="copyLink('${item.url}')">주소 복사</button>
                </div>
            `;
        });
    }

    // 복사 기능들
    function copyLink(url) {
        navigator.clipboard.writeText(url).then(() => alert("주소가 복사되었습니다!"));
    }

    async function copyImage(src) {
        try {
            const data = await fetch(src);
            const blob = await data.blob();
            await navigator.clipboard.write([new ClipboardItem({[blob.type]: blob})]);
            alert("QR 이미지가 복사되었습니다!");
        } catch (e) { alert("우클릭 후 '이미지 복사'를 이용해주세요."); }
    }

    window.onload = renderTools;
</script>

</body>
</html>
